name: Sync Companies (Weekly)

# 매주 월요일 03:00 UTC (한국시간 12:00) 자동 실행
# workflow_dispatch로 수동 실행도 가능
on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  sync:
    name: Trigger Cloudflare Pages sync
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Diagnose connectivity to Cloudflare Pages
        env:
          BASE_URL: https://jusik101.pages.dev
        run: |
          echo "=== DNS resolution ==="
          dig +short jusik101.pages.dev | head -5 || true

          echo "=== Test GET / (homepage) ==="
          curl -sS -o /dev/null -w "HTTP %{http_code} | %{time_total}s | %{size_download} bytes\n" \
            --max-time 30 "$BASE_URL/" || echo "GET / failed: $?"

          echo "=== Test GET /robots.txt (small file) ==="
          curl -sS -o /dev/null -w "HTTP %{http_code} | %{time_total}s | %{size_download} bytes\n" \
            --max-time 30 "$BASE_URL/robots.txt" || echo "GET /robots.txt failed: $?"

          echo "=== Test GET /api/search?q=test (Edge Function) ==="
          curl -sS -o /dev/null -w "HTTP %{http_code} | %{time_total}s | %{size_download} bytes\n" \
            --max-time 30 "$BASE_URL/api/search?q=test" || echo "GET /api/search failed: $?"

      - name: Call /api/sync/companies
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SYNC_URL: https://jusik101.pages.dev/api/sync/companies
        run: |
          set -euo pipefail

          echo "=== POST /api/sync/companies (verbose) ==="
          # -v로 자세한 로그 (헤더, 연결 단계 등 노출)
          # --max-time 60: GitHub Actions에선 60초 한도로 빠른 실패 유도
          RESPONSE=$(curl -v -X POST "$SYNC_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -H "User-Agent: jusik101-cron/1.0" \
            --ipv4 \
            --max-time 60 \
            -w "\n__HTTP_CODE__:%{http_code}\n__TIME__:%{time_total}\n" \
            2>&1) || true

          echo "=== Response ==="
          echo "$RESPONSE"

          HTTP_CODE=$(echo "$RESPONSE" | grep -oE '__HTTP_CODE__:[0-9]+' | tail -1 | cut -d: -f2)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "::notice::Sync successful"
          else
            echo "::error::Sync failed with HTTP code: ${HTTP_CODE:-no-response}"
            exit 1
          fi
