name: Sync Companies (Weekly)

# 매주 월요일 03:00 UTC (한국시간 12:00) 자동 실행
# workflow_dispatch로 수동 실행도 가능
on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  sync:
    name: Sync D1 + refresh companies.json
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # main에 자동 commit 권한

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ---- Phase 1: D1 sync via Cloudflare Pages endpoint ----

      - name: Warm up Worker
        env:
          BASE_URL: https://jusik101.pages.dev
        run: |
          curl -sS -o /dev/null --max-time 30 --ipv4 \
            -H "User-Agent: jusik101-cron/1.0" \
            "$BASE_URL/api/search?q=test" || true

      - name: Call /api/sync/companies
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SYNC_URL: https://jusik101.pages.dev/api/sync/companies
        run: |
          set -euo pipefail

          RESPONSE=$(curl -sS -X POST "$SYNC_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -H "User-Agent: jusik101-cron/1.0" \
            --ipv4 \
            --max-time 90 \
            --retry 2 --retry-delay 5 --retry-all-errors \
            -w "\n__HTTP_CODE__:%{http_code}\n__TIME__:%{time_total}\n")

          HTTP_CODE=$(echo "$RESPONSE" | grep -oE '__HTTP_CODE__:[0-9]+' | tail -1 | cut -d: -f2)
          TIME_TOTAL=$(echo "$RESPONSE" | grep -oE '__TIME__:[0-9.]+' | tail -1 | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/^__HTTP_CODE__:/d; /^__TIME__:/d')

          echo "HTTP Status: $HTTP_CODE"
          echo "Total Time:  ${TIME_TOTAL}s"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::D1 sync failed with HTTP $HTTP_CODE"
            exit 1
          fi

          if ! echo "$BODY" | grep -q '"success":true'; then
            echo "::error::Sync response did not indicate success"
            exit 1
          fi

          SYNCED=$(echo "$BODY" | grep -oE '"synced":[0-9]+' | cut -d: -f2)
          echo "::notice::D1 synced $SYNCED companies in ${TIME_TOTAL}s"

      # ---- Phase 2: Export D1 → companies.json + commit if changed ----

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Export D1 to companies.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          wrangler d1 execute jusik101-companies --remote \
            --command="SELECT corp_code, corp_name, stock_code, listed_market, market_cap FROM companies WHERE stock_code IS NOT NULL ORDER BY market_cap DESC NULLS LAST" \
            --json > /tmp/d1.json

          python3 <<'EOF'
          import json
          with open('/tmp/d1.json') as f:
              raw = json.load(f)
          results = raw[0]['results'] if isinstance(raw, list) else raw.get('results', [])

          out = []
          for r in results:
              out.append({
                  'corpCode': r['corp_code'],
                  'corpName': r['corp_name'],
                  'stockCode': r['stock_code'],
                  'listedMarket': r.get('listed_market') or 'OTHER',
                  'marketCap': r.get('market_cap'),
              })

          with open('src/data/companies.json', 'w', encoding='utf-8') as f:
              json.dump(out, f, ensure_ascii=False, indent=2)

          print(f'companies.json: {len(out)} entries')
          EOF

      - name: Commit if companies.json changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add src/data/companies.json

          if git diff --staged --quiet; then
            echo "::notice::No changes to companies.json (no new/changed companies)"
            exit 0
          fi

          STATS=$(git diff --staged --shortstat src/data/companies.json)
          ENTRIES=$(python3 -c "import json; print(len(json.load(open('src/data/companies.json'))))")

          git commit -m "chore: refresh companies.json from D1 [skip ci]

          Auto-generated by sync-companies workflow.
          Total entries: $ENTRIES
          $STATS"

          git push
          echo "::notice::companies.json updated and pushed to main"
